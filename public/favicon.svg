  <rect x="42.5" y="50" width="15" height="15" rx="3" fill="#1c1917" />
  <rect x="65" y="50" width="15" height="15" rx="3" fill="#1c1917" />
  
  <rect x="20" y="70" width="15" height="15" rx="3" fill="#1c1917" />
  <rect x="42.5" y="70" width="15" height="15" rx="3" fill="#1c1917" />
  <rect x="65" y="70" width="15" height="15" rx="3" fill="#ea580c" />
</svg>
